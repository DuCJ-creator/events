<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L1 U11-15 Crazy Cats</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f8ff;
            margin: 0;
            padding: 10px;
            touch-action: manipulation;
        }
        #game-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        #fish-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 0 auto 15px;
        }
        #fish {
            width: 60px;
            height: 60px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M80,50 Q100,30 80,10 Q60,30 80,50 Q100,70 80,90 Q60,70 80,50" fill="%23FFA500"/><circle cx="70" cy="40" r="3" fill="%23000"/><path d="M30,50 L10,30 M30,50 L10,70" stroke="%23000" stroke-width="2"/></svg>');
            background-size: contain;
            position: relative;
            transition: transform 0.3s;
        }
        #fish-count {
            font-size: 24px;
            margin-left: 10px;
        }
        #score {
            font-size: 18px;
            font-weight: bold;
        }
        #question {
            font-size: 18px;
            margin: 10px 0;
            min-height: 50px;
            word-break: break-word;
            font-weight: bold;
        }
        #options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 15px 0;
        }
        .option {
            padding: 10px 5px;
            background-color: #FFA500;
            color: #333;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s;
            word-break: break-word;
        }
        .option:hover, .option:active {
            background-color: #FF8C00;
        }
        #cat {
            width: 100px;
            height: 80px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100"><circle cx="60" cy="50" r="30" fill="%23FF8C00" stroke="%23000" stroke-width="2"/><circle cx="45" cy="40" r="5" fill="%23000"/><circle cx="75" cy="40" r="5" fill="%23000"/><path d="M50,65 Q60,75 70,65" stroke="%23000" stroke-width="2" fill="none"/><path d="M40,20 Q50,10 60,20 Q70,10 80,20" stroke="%23000" stroke-width="2" fill="none"/><path d="M30,50 L10,40 M30,50 L10,60" stroke="%23000" stroke-width="2" fill="none"/><path d="M90,50 L110,40 M90,50 L110,60" stroke="%23000" stroke-width="2" fill="none"/></svg>');
            background-size: contain;
            margin: 15px auto;
            background-repeat: no-repeat;
            transition: all 0.3s;
            animation: walk 2s infinite alternate;
        }
        @keyframes walk {
            0% { transform: translateX(-10px); }
            100% { transform: translateX(10px); }
        }
        .cat-eating {
            transform: scale(1.1);
            animation: eat 0.5s ease-in-out, walk 2s infinite alternate;
        }
        .cat-angry {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100"><circle cx="60" cy="50" r="30" fill="%23FF8C00" stroke="%23000" stroke-width="2"/><path d="M40,45 L50,45 M70,45 L80,45" stroke="%23000" stroke-width="3"/><path d="M50,65 Q60,75 70,65" stroke="%23000" stroke-width="2" fill="none"/><path d="M40,20 Q50,10 60,20 Q70,10 80,20" stroke="%23000" stroke-width="2" fill="none"/><path d="M30,50 L10,40 M30,50 L10,60" stroke="%23000" stroke-width="2" fill="none"/><path d="M90,50 L110,40 M90,50 L110,60" stroke="%23000" stroke-width="2" fill="none"/></svg>') !important;
            animation: walk 2s infinite alternate;
        }
        @keyframes eat {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        #game-over {
            display: none;
            color: #8B4513;
            font-size: 20px;
            font-weight: bold;
            margin: 15px 0;
        }
        #restart {
            padding: 8px 16px;
            background-color: #FF6347;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin: 10px auto;
        }
        #restart:hover, #restart:active {
            background-color: #FF4500;
        }
        #stop-game {
            padding: 8px 16px;
            background-color: #4682B4;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin: 10px auto;
            display: none;
        }
        #stop-game:hover, #stop-game:active {
            background-color: #4169E1;
        }
        #game-stats {
            display: none;
            margin-top: 10px;
            font-size: 16px;
        }
        
        /* 手機版調整 */
        @media (max-width: 480px) {
            #game-container {
                padding: 10px;
            }
            #fish {
                width: 50px;
                height: 50px;
            }
            #question {
                font-size: 16px;
            }
            .option {
                font-size: 13px;
                padding: 8px 3px;
            }
            #cat {
                width: 80px;
                height: 70px;
            }
            #fish-container {
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>L1 U11-15 Crazy Cats</h1>
        <div id="cat"></div>
        <div id="fish-container">
            <div id="fish"></div>
            <div id="score">魚: 0</div>
            <div id="fish-count">🐟</div>
        </div>
        <div id="question"></div>
        <div id="options"></div>
        <div id="game-over"></div>
        <div id="game-stats"></div>
        <button id="stop-game">停止遊戲</button>
        <button id="restart">重新開始</button>
    </div>

    <script>
        // 單字表
        const vocabulary = parseVocabulary(`
common,n,公共用地;公有地  
down,v,擊倒;一口氣喝下/吃下  
ease,n,容易;不費力;舒適;悠閒;放鬆;緩和  
eleven,n,十一  
eleven,adj,十一的  
enough,adv,足夠地;充分地;很;十分  
even,adv,即使  
feeling,n,感覺  
gun,n,槍  
gun,v,用槍射擊  
last,adv,最後地  
mail,n,信件  
nose,v,探問;探著;引導;嗅;聞  
order,v,點菜;訂購  
over,adv,在上方;越過;過分;太;再一次  
people,v,使人住在;居住於  
poetry,n,詩;詩歌;韻文  
six,n,六  
six,adj,六的  
stay,v,停留  
this,adj,這  
though,adv,(一般放在句尾)然而;還是  
unit,n,單位;單元;組件  
word,n,字  
worse,adj,更壞的;更差的  
autumn,n,秋季  
balloon,n,氣球  
balloon,v,像氣球般鼓起(或膨脹);乘氣球上升;激增  
bring,v,帶來  
danger,n,危險  
high,adj,高的  
hit,v,打;擊  
into,prep,進入  
iron,adj,鐵的;剛強的;殘酷的  
knife,n,刀子  
law,n,法律  
lift,v,舉起  
like,prep,像;如  
notice,n,注意;通知  
red,n,紅色  
red,adj,紅色的  
ride,n,搭乘;兜風  
ring,v,(鐘;鈴等)鳴;響  
sail,n,帆;篷;帆狀物;船隻  
same,adj,相同的  
show,n,展覽;電影  
shy,adj,害羞的  
small,adj,小的  
summer,n,夏天  
tail,n,尾巴  
tale,n,故事;傳說;謊話  
thirty,n,三十  
thirty,adj,三十的  
top,n,頂部;陀螺  
try,n,嘗試;努力  
up,adv,向上  
up,adj,上行的  
will,v,將  
wish,v,祝福  
able,adj,能;有能力的  
basic,adj,基本的  
bread,n,麵包  
center,n,中心(點) (美式拼寫)  
cow,n,母牛  
dry,adj,乾的;乾燥的;乏味的  
force,n,力量;暴力;武力;兵力  
garden,n,花園  
mom,n,媽媽 (美式拼寫;=mommy)  
nice,adj,好的;令人愉快的  
receive,v,收到  
roof,v,給...蓋屋頂;覆蓋  
saw,v,鋸;鋸開  
seat,n,座位  
seed,n,種子  
shark,n,鯊魚  
since,conj,自...以來;因為  
slow,adv,慢慢地;遲遲地;慢了地  
smoke,n,煙  
sweet,n,(餐後的)甜點;(用作稱呼語)親愛的;寶貝  
that,adv,那樣;那麼  
till,prep,直到  
tiny,adj,微小的  
west,n,西方  
west,adj,西方的  
when,conj,當...時  
alone,adj,單獨的;孤單的  
alone,adv,獨自地  
appear,v,出現  
catch,n,抓住;捕捉;接球;把手;圈套  
cause,n,原因;理由  
cop,n,警察  
cry,n,叫喊;呼叫;(一陣)哭  
eighty,n,八十  
eighty,adj,八十的  
enter,v,輸入;進入  
fact,n,事實  
fear,v,畏懼  
forget,v,忘記  
half,adv,部分地;相當地;一半地;幾乎  
leader,n,領袖  
line,v,排隊  
most,adj,最多的;大部分的  
oil,n,油  
once,conj,一旦;一經...便  
rock,n,岩石;搖滾樂  
round,v,變圓;發胖;兜圈子;環行  
round,adv,環繞地;循環地;在附近;逐一;挨次  
sit,v,坐  
stair,n,梯級;樓梯  
step,v,跨(步);踏(腳)  
total,adj,總的  
bit,n,小片;少量;一點點;片刻;位元  
close,adv,接近;靠近地;緊密地;緊緊地  
color,v,著色;渲染;文飾;歪曲;影響 (美式拼寫)  
day,n,白天;日  
each,adj,每個  
ever,adv,從來;曾經  
factory,n,工廠  
fog,n,霧  
gas,v,放出氣體;加油;空談;吹牛  
glass,n,玻璃杯;玻璃  
grandmother,n,祖母;外祖母 (=grandma)  
group,n,一群  
hard,adj,硬的;難的  
hat,n,帽子  
home,n,家  
how,adv,如何  
lamp,n,燈  
life,n,人生;生命  
lift,n,提;吊;升;鼓舞;電梯  
mister,n,先生 (=Mr.)  
moon,n,月亮  
neck,n,脖子  
need,v,(用於疑問句和否定句)需要;必須  
ninety,n,九十  
ninety,adj,九十的  
pants,n,褲子  
rubber,n,橡膠  
say,v,說  
someone,n,某人;有名氣的人  
south,adj,南方的  
sport,v,炫耀;誇示;遊戲;開玩笑;嘲弄;突變  
stay,n,停留;逗留;停止;延後;持續力  
Thursday,n,星期四  
until,prep,直到  
voice,n,(人的)聲音  
warm,v,使暖和  
weekend,n,周末  
worse,adv,更壞;更糟;更厲害地  
worst,adj,最壞的;最差的  
yummy,adj,好吃的  
false,adj,假的
        `);
        
        // 遊戲變數
        let score = 0;
        let currentQuestion = null;
        let gameActive = false;
        let wrongCount = 0;
        let isAnswering = false;
        let startTime = 0;
        let endTime = 0;
        
        // DOM元素
        const questionEl = document.getElementById('question');
        const optionsEl = document.getElementById('options');
        const scoreEl = document.getElementById('score');
        const gameOverEl = document.getElementById('game-over');
        const gameStatsEl = document.getElementById('game-stats');
        const restartBtn = document.getElementById('restart');
        const stopGameBtn = document.getElementById('stop-game');
        const fishEl = document.getElementById('fish');
        const catEl = document.getElementById('cat');
        const fishCountEl = document.getElementById('fish-count');
        
        // 解析單字表
        function parseVocabulary(text) {
            const lines = text.split('\n');
            const result = [];
            
            for (const line of lines) {
                const trimmed = line.trim();
                if (trimmed) {
                    const parts = trimmed.split(',');
                    if (parts.length >= 3) {
                        result.push({
                            word: parts[0].trim(),
                            pos: parts[1].trim(),
                            meaning: parts[2].trim()
                        });
                    }
                }
            }
            
            return result;
        }
        
        // 結束遊戲
        function endGame(isVoluntary = false) {
            gameActive = false;
            isAnswering = false;
            endTime = Date.now();
            const timeSpent = Math.floor((endTime - startTime) / 1000);
            
            gameOverEl.style.display = 'block';
            gameStatsEl.style.display = 'block';
            
            if (isVoluntary) {
                gameOverEl.textContent = "遊戲已停止！";
                gameStatsEl.innerHTML = `
                    <div>總共抓到: <strong>${score}</strong> 條魚</div>
                    <div>遊戲時間: <strong>${timeSpent}</strong> 秒</div>
                `;
            } else {
                gameOverEl.textContent = "🐟已遊走，再抓一次！";
                gameStatsEl.innerHTML = `
                    <div>抓到: <strong>${score}</strong> 條魚</div>
                    <div>堅持了: <strong>${timeSpent}</strong> 秒</div>
                `;
                
                fishEl.style.transform = 'translateY(15px) rotate(45deg)';
                fishEl.style.backgroundImage = 'url("data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'><path d=\'M80,50 Q100,30 80,10 Q60,30 80,50 Q100,70 80,90 Q60,70 80,50\' fill=\'%238B4513\'/><circle cx=\'70\' cy=\'40\' r=\'3\' fill=\'%23000\'/><path d=\'M30,50 L10,30 M30,50 L10,70\' stroke=\'%23000\' stroke-width=\'2\'/></svg>")';
                
                setTimeout(() => {
                    catEl.classList.add('cat-angry');
                }, 300);
            }
            
            restartBtn.style.display = 'block';
            stopGameBtn.style.display = 'none';
        }
        
        // 開始遊戲
        function startGame() {
            score = 0;
            wrongCount = 0;
            gameActive = true;
            startTime = Date.now();
            gameOverEl.style.display = 'none';
            gameStatsEl.style.display = 'none';
            restartBtn.style.display = 'none';
            stopGameBtn.style.display = 'block';
            catEl.classList.remove('cat-angry');
            updateScore();
            nextQuestion();
        }
        
        // 下一題
        function nextQuestion() {
            if (!gameActive) return;
            
            const correctIndex = Math.floor(Math.random() * vocabulary.length);
            currentQuestion = vocabulary[correctIndex];
            
            questionEl.textContent = `${currentQuestion.word} [${currentQuestion.pos}]`;
            
            const options = [currentQuestion.meaning];
            while (options.length < 4) {
                const randomMeaning = vocabulary[Math.floor(Math.random() * vocabulary.length)].meaning;
                if (!options.includes(randomMeaning)) {
                    options.push(randomMeaning);
                }
            }
            
            shuffleArray(options);
            
            optionsEl.innerHTML = '';
            options.forEach(option => {
                const button = document.createElement('button');
                button.className = 'option';
                button.textContent = option;
                button.addEventListener('click', function() {
                    checkAnswer(option);
                });
                optionsEl.appendChild(button);
            });
            
            fishEl.style.transform = 'translateY(0)';
            fishEl.style.backgroundImage = 'url("data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'><path d=\'M80,50 Q100,30 80,10 Q60,30 80,50 Q100,70 80,90 Q60,70 80,50\' fill=\'%23FFA500\'/><circle cx=\'70\' cy=\'40\' r=\'3\' fill=\'%23000\'/><path d=\'M30,50 L10,30 M30,50 L10,70\' stroke=\'%23000\' stroke-width=\'2\'/></svg>")';
        }
        
        // 檢查答案
        function checkAnswer(selectedMeaning) {
            if (!gameActive || isAnswering) return;
            
            isAnswering = true;
            
            catEl.classList.add('cat-eating');
            setTimeout(() => {
                catEl.classList.remove('cat-eating');
            }, 500);
            
            if (selectedMeaning === currentQuestion.meaning) {
                score++;
                wrongCount = 0;
                updateScore();
                fishEl.style.transform = 'translateY(-15px)';
                setTimeout(() => {
                    isAnswering = false;
                    nextQuestion();
                }, 400);
            } else {
                wrongCount++;
                const penalty = wrongCount;
                
                if (score >= penalty) {
                    score -= penalty;
                    updateScore();
                    
                    const penaltyMsg = document.createElement('div');
                    penaltyMsg.textContent = `錯誤！扣 ${penalty} 條魚`;
                    penaltyMsg.style.color = 'red';
                    penaltyMsg.style.fontWeight = 'bold';
                    penaltyMsg.style.marginTop = '5px';
                    questionEl.appendChild(penaltyMsg);
                    
                    setTimeout(() => {
                        if (questionEl.contains(penaltyMsg)) {
                            questionEl.removeChild(penaltyMsg);
                        }
                    }, 1000);
                    
                    setTimeout(() => {
                        isAnswering = false;
                        nextQuestion();
                    }, 1000);
                } else {
                    score = 0;
                    updateScore();
                    isAnswering = false;
                    endGame(false);
                }
            }
        }
        
        // 更新分數
        function updateScore() {
            scoreEl.textContent = `魚: ${score}`;
            fishCountEl.textContent = '🐟'.repeat(Math.min(score, 5));
        }
        
        // 重新開始遊戲
        restartBtn.addEventListener('click', function() {
            startGame();
        });
        
        // 停止遊戲按鈕事件
        stopGameBtn.addEventListener('click', function() {
            if (gameActive) {
                endGame(true);
            }
        });
        
        // 輔助函數：打亂陣列
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // 自動開始遊戲
        startGame();
    </script>
</body>
</html>
